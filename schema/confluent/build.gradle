description = 'Confluent schema registry integration'

dependencies {
    api project(':protomolt-descriptors')

    // Confluent Schema Registry subjects API support: JSON responses + shared .proto compilation.
    implementation project(':protomolt-proto-sources')
    implementation libs.jackson.databind

    testImplementation libs.testcontainers.redpanda
    testImplementation libs.testcontainers.junit.jupiter
}

// Forward the Apicurio integration-test endpoint override (see docs/building.md
// "Integration tests") to the test JVM. The Confluent lanes self-provision a Redpanda
// Testcontainer and take no endpoint override.
tasks.withType(Test).configureEach {
    def value = providers.systemProperty('pipestream.it.apicurio.url')
    if (value.isPresent()) {
        systemProperty 'pipestream.it.apicurio.url', value.get()
    }
}
