include 'proteus-quarkus-deployment'
project(':proteus-quarkus-deployment').projectDir = file('integrations/quarkus/deployment')

include 'proteus-spring'
project(':proteus-spring').projectDir = file('integrations/spring')

include 'proteus-server-common'
project(':proteus-server-common').projectDir = file('servers/common')

include 'proteus-server-jdk'
project(':proteus-server-jdk').projectDir = file('servers/jdk')

include 'proteus-server-vertx'
project(':proteus-server-vertx').projectDir = file('servers/vertx')

include 'proteus-server-netty'
project(':proteus-server-netty').projectDir = file('servers/netty')

include 'proteus-server-spring'
