include 'proteus-schema-apicurio-deployment'
project(':proteus-schema-apicurio-deployment').projectDir = file('schema/apicurio/deployment')

include 'proteus-schema-confluent'
project(':proteus-schema-confluent').projectDir = file('schema/confluent')

include 'proteus-index-spi'
project(':proteus-index-spi').projectDir = file('index/spi')

include 'proteus-index-ndjson'
project(':proteus-index-ndjson').projectDir = file('index/ndjson')

include 'proteus-index-lucene'
project(':proteus-index-lucene').projectDir = file('index/lucene')

include 'proteus-index-opensearch'
project(':proteus-index-opensearch').projectDir = file('index/opensearch')

include 'proteus-index-solr'
project(':proteus-index-solr').projectDir = file('index/solr')

include 'proteus-json'
project(':proteus-json').projectDir = file('http/json')

include 'proteus-rest'
project(':proteus-rest').projectDir = file('http/rest')

include 'proteus-openapi'
