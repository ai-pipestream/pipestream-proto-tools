pluginManagement {
    repositories {
        mavenLocal()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
}

rootProject.name = 'proteus'

include 'bom'

include 'proteus-formats'
project(':proteus-formats').projectDir = file('formats')

include 'proteus-descriptors'
project(':proteus-descriptors').projectDir = file('core/descriptors')

include 'proteus-helpers'
project(':proteus-helpers').projectDir = file('core/helpers')

include 'proteus-mapper-core'
project(':proteus-mapper-core').projectDir = file('mapper/core')

include 'proteus-mapper-cel'
project(':proteus-mapper-cel').projectDir = file('mapper/cel')

include 'proteus-metadata'
project(':proteus-metadata').projectDir = file('mapper/metadata')

include 'proteus-protobuf-metadata'
project(':proteus-protobuf-metadata').projectDir = file('protobuf/metadata')

include 'proteus-protobuf-validation'
project(':proteus-protobuf-validation').projectDir = file('protobuf/validation')

include 'proteus-protobuf-validation-protovalidate'
project(':proteus-protobuf-validation-protovalidate').projectDir = file('protobuf/validation-protovalidate')

include 'proteus-protobuf-validation-conformance'
project(':proteus-protobuf-validation-conformance').projectDir = file('protobuf/validation-conformance')

include 'proteus-protobuf-indexing'
