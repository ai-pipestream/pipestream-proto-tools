// Data quality as a property of the schema.
//
// A message declares its own quality dimensions, each a CEL expression over the message
// (`this`) returning a score. The dimensions travel with the descriptor exactly like
// validation rules do: git-reviewable, registry-free, and readable by anything that can read
// a descriptor set. Validation says whether data is admissible; quality says how good the
// admissible data is.
syntax = "proto3";

package ai.pipestream.proto.quality.v1;

import "google/protobuf/descriptor.proto";

option java_package = "ai.pipestream.proto.quality";
option java_outer_classname = "QualityProto";
option java_multiple_files = true;

extend google.protobuf.MessageOptions {
  QualityRules quality = 59100501;
}

// The quality dimensions a message declares for itself.
message QualityRules {
  repeated QualityDimension dimension = 1;
}

// One scored aspect of a message's quality.
message QualityDimension {
  // Stable id the score is reported under, e.g. "completeness".
  string id = 1;

  // CEL over `this` (the message) returning a number, coerced to double and clamped to
  // [0, 1]; a bool result scores 1.0 or 0.0. The helpers exp(x) and clamp(x, lo, hi) are
  // available. An expression that fails to compile is a schema error; one that fails to
  // evaluate marks the dimension failed rather than scored.
  string cel = 2;

  // Weight of this dimension in the composite score. Unset (0) means 1.0.
  double weight = 3;
}
